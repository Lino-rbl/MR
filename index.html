<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rifa — Elige tus números</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>

  <div id="app">
    <header class="page-header">
      <h1>Rifa</h1>
      <p class="subtitle">Selecciona exactamente 4 números del <strong>0001</strong> al <strong>5999</strong> para generar tu boleto.</p>
    </header>

    <section class="selection-section">
      <div class="selection-bar" id="sel-bar">
        <span class="sel-hint">No has seleccionado ningún número aún.</span>
      </div>
    </section>

    <section class="controls-section">
      <input type="number" id="search" placeholder="Buscar número (ej. 1234)..." min="1" max="5999" />
      <div class="controls-right">
        <span class="counter-badge" id="counter">0 / 4 seleccionados</span>
        <button class="btn-main" id="gen-btn" disabled>Generar boleto</button>
      </div>
    </section>

    <section class="grid-section">
      <div class="grid-header">
        Números disponibles — haz clic para seleccionar
      </div>
      <div class="grid" id="grid"></div>
    </section>
  </div>

  <!-- Ticket overlay -->
  <div id="ticket-overlay">
    <div id="ticket-box">
      <div class="ticket-header">
        <div class="ticket-logo">BOLETO OFICIAL</div>
        <h2>Tu boleto de rifa</h2>
        <p id="ticket-date"></p>
      </div>
      <div class="ticket-divider">
        <span>★</span>
      </div>
      <div class="ticket-nums" id="ticket-nums"></div>
      <div class="ticket-footer">
        <p class="ticket-folio" id="ticket-id"></p>
        <div class="ticket-actions no-print">
          <button class="btn-secondary" id="close-btn">Cerrar</button>
          <button class="btn-main" id="print-btn">Imprimir boleto</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./src/app.js"></script>
</body>
</html>
